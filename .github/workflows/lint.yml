name: Python Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8

      - name: Run Black
        run: black --check apps/backend run_tests.py

      - name: Run isort
        run: isort --check-only apps/backend run_tests.py

      - name: Run Flake8
        run: flake8 apps/backend run_tests.py --max-line-length=120
