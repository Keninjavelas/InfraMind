version: '3.8'

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=sqlite:///./inframind.db
      - VECTOR_DB_PATH=./vector_db
    volumes:
      - ./apps/backend/app:/app/app
      - ./data:/app/data
